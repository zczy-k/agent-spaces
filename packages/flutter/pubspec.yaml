name: agent_spaces
description: "Agent Spaces - Multi-Agent Collaborative Programming Platform"
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # WebView
  flutter_inappwebview: ^6.1.5

  # Notifications
  awesome_notifications: ^0.11.0

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.8.1

  # Storage
  shared_preferences: ^2.5.3

  # Utils
  logger: ^2.5.0
  path_provider: ^2.1.5
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  uuid: ^4.5.1
  upgrader: ^13.3.0
  docking: ^1.16.2
  xterm: ^4.0.0
  dartssh2: ^2.17.1
  easy_localization: ^3.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.14
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  windows:
    generate: true
  web:
    generate: true
  image_path: "assets/icons/icon.png"
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/icons/icon.png"

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/translations/
    # BEGIN GENERATED WEB ASSETS
    - assets/web/
    - assets/web/_next/static/
    - assets/web/_next/static/chunks/
    - assets/web/_next/static/media/
    - assets/web/_not-found/
    - assets/web/icons/
    - assets/web/login/
    - assets/web/monaco/
    - assets/web/monaco/vs/
    - assets/web/monaco/vs/assets/
    - assets/web/monaco/vs/basic-languages/
    - assets/web/monaco/vs/editor/
    - assets/web/monaco/vs/language/
    - assets/web/monaco/vs/language/css/
    - assets/web/monaco/vs/language/html/
    - assets/web/monaco/vs/language/json/
    - assets/web/monaco/vs/language/typescript/
    - assets/web/settings/
    - assets/web/settings/agents/
    - assets/web/settings/mcps/
    - assets/web/settings/models/
    - assets/web/settings/output-styles/
    - assets/web/settings/prompts/
    - assets/web/settings/providers/
    - assets/web/settings/skills/
    - assets/web/workflows/
    - assets/web/workspace/
    - assets/web/workspace/_/
    - assets/web/workspaces/
    # END GENERATED WEB ASSETS
