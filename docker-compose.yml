services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3100:3100"
    volumes:
      - agent-spaces-data:/root/.agent-spaces-data
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - AGENT_SPACES_DATA_DIR=/root/.agent-spaces-data
    restart: unless-stopped
volumes:
  agent-spaces-data:
