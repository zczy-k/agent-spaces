services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "3100:3100"
    volumes:
      - agent-spaces-data:/root/.agent-spaces-data
    environment:
      - PORT=3100
      - HOST=0.0.0.0
      - AGENT_SPACES_DATA_DIR=/root/.agent-spaces-data
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        - SERVER_URL=http://server:3100
    ports:
      - "3000:3000"
    environment:
      - HOSTNAME=0.0.0.0
      - PORT=3000
    depends_on:
      - server
    restart: unless-stopped

volumes:
  agent-spaces-data:
