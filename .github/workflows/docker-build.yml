name: Build and Push Docker Images

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - uses: actions/checkout@v4

    - uses: docker/setup-buildx-action@v3

    - uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - uses: docker/metadata-action@v5
      id: meta
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/server
        tags: |
          type=raw,value=latest,enable={{is_default_branch}}
          type=semver,pattern={{version}}
          type=sha,prefix=

    - uses: docker/build-push-action@v6
      id: build
      with:
        context: .
        file: ./Dockerfile.server
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        platforms: linux/amd64,linux/arm64
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Build Linux AMD64 image for tar export
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.server
        load: true
        tags: agent_spaces-server:${{ github.ref_name }}
        platforms: linux/amd64
        cache-from: type=gha

    - name: Export Docker image tar
      run: |
        mkdir -p dist
        TAR_PATH="dist/agent_spaces-server-${GITHUB_REF_NAME}-linux-amd64.tar"
        docker save --output "$TAR_PATH" "agent_spaces-server:${GITHUB_REF_NAME}"
        sha256sum "$TAR_PATH" > "$TAR_PATH.sha256"
        ls -lh "$TAR_PATH" "$TAR_PATH.sha256"

    - name: Upload Docker tar to GitHub Release
      run: |
        TAG="${GITHUB_REF_NAME}"
        gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --generate-notes
        gh release upload "$TAG" \
          "dist/agent_spaces-server-${TAG}-linux-amd64.tar" \
          "dist/agent_spaces-server-${TAG}-linux-amd64.tar.sha256" \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  make-public:
    needs: [build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      packages: write

    steps:
    - name: Set packages visibility to public
      run: |
        REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "Setting server to public..."
        gh api \
          --method PATCH \
          -H "Accept: application/vnd.github+json" \
          -H "X-GitHub-Api-Version: 2022-11-28" \
          "/user/packages/container/${REPO}%2Fserver/visibility" \
          -f visibility='public' || echo "May need manual setup for server"
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
