name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & server
        run: pnpm --filter @agent-spaces/shared build && pnpm --filter @agent-spaces/server build

      - name: Build web
        run: pnpm --filter @agent-spaces/web build
        env:
          NEXT_STATIC_EXPORT: 1

      - name: Copy web dist
        run: node scripts/copy-web.mjs

      - name: Build macOS
        working-directory: packages/tauri
        run: pnpm build:macos

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: |
            packages/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
            packages/tauri/src-tauri/target/aarch64-apple-darwin/release/bundle/macos/*.app

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-ios

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & server
        run: pnpm --filter @agent-spaces/shared build && pnpm --filter @agent-spaces/server build

      - name: Build web
        run: pnpm --filter @agent-spaces/web build
        env:
          NEXT_STATIC_EXPORT: 1

      - name: Copy web dist
        run: node scripts/copy-web.mjs

      - name: Build iOS (unsigned)
        working-directory: packages/tauri
        env:
          CODE_SIGN_IDENTITY: ""
          CODE_SIGNING_REQUIRED: "NO"
          CODE_SIGNING_ALLOWED: "NO"
          DEVELOPMENT_TEAM: ""
        run: |
          pnpm tauri ios build --target aarch64 --no-sign --ci -- \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM=""

      - name: Package IPA
        run: |
          APP_PATH=$(find packages/tauri/src-tauri/gen/apple -name "Agent Spaces.app" -path "*/Release-iphoneos/*" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app"
            find packages/tauri/src-tauri/gen/apple -name "*.app" || true
            exit 1
          fi
          IPA_DIR=$(mktemp -d)
          mkdir -p "$IPA_DIR/Payload"
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r "$GITHUB_WORKSPACE/packages/tauri/Agent Spaces.ipa" Payload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: packages/tauri/Agent Spaces.ipa

  build-android:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK
        run: sdkmanager "ndk;28.0.13004108"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared & server
        run: pnpm --filter @agent-spaces/shared build && pnpm --filter @agent-spaces/server build

      - name: Build web
        run: pnpm --filter @agent-spaces/web build
        env:
          NEXT_STATIC_EXPORT: 1

      - name: Copy web dist
        run: node scripts/copy-web.mjs

      - name: Decode keystore
        working-directory: packages/tauri/src-tauri/gen/android/app
        run: |
          echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode -o release-key.jks

      - name: Build Android
        working-directory: packages/tauri
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: pnpm build:android

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            packages/tauri/src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
            packages/tauri/src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab

  release:
    needs: [build-macos, build-ios, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | head -30

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos/*.dmg
            artifacts/ios/*.ipa
            artifacts/android/*.apk
            artifacts/android/*.aab
