name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-web-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install web dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: |
          pnpm --filter @agent-spaces/shared build
          NEXT_STATIC_EXPORT=1 pnpm --filter @agent-spaces/web build
          node scripts/copy-web.mjs

      - name: Upload Flutter web assets
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-assets
          path: |
            packages/flutter/assets/web
            packages/flutter/pubspec.yaml

  build-macos:
    needs: build-web-assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter web assets
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-assets
          path: packages/flutter

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/flutter

      - name: Build macOS
        working-directory: packages/flutter
        run: flutter build macos --release

      - name: Package macOS
        run: |
          APP_PATH=$(find packages/flutter/build/macos/Build/Products/Release -maxdepth 1 -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app"
            find packages/flutter/build/macos -name "*.app" || true
            exit 1
          fi
          echo "Using app bundle: $APP_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" packages/flutter/AgentSpaces-macos.zip

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos
          path: packages/flutter/AgentSpaces-macos.zip

  build-ios:
    needs: build-web-assets
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter web assets
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-assets
          path: packages/flutter

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/flutter

      - name: Build iOS (no-codesign)
        working-directory: packages/flutter
        run: flutter build ios --release --no-codesign

      - name: Package IPA
        run: |
          APP_PATH=$(find packages/flutter/build/ios/iphoneos -name "Runner.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Could not find built .app"
            find packages/flutter/build -name "*.app" || true
            exit 1
          fi
          echo "Using app bundle: $APP_PATH"
          IPA_DIR=$(mktemp -d)
          mkdir -p "$IPA_DIR/Payload"
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r "$GITHUB_WORKSPACE/packages/flutter/AgentSpaces.ipa" Payload

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios
          path: packages/flutter/AgentSpaces.ipa

  build-windows:
    needs: build-web-assets
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter web assets
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-assets
          path: packages/flutter

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/flutter

      - name: Build Windows
        working-directory: packages/flutter
        run: flutter build windows --release

      - name: Package Windows
        shell: pwsh
        run: |
          $releaseDir = "packages/flutter/build/windows/x64/runner/Release"
          $zipPath = "packages/flutter/AgentSpaces-windows.zip"
          if (!(Test-Path $releaseDir)) {
            Write-Error "Could not find Windows release directory: $releaseDir"
            exit 1
          }
          Compress-Archive -Path "$releaseDir/*" -DestinationPath $zipPath -Force

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: packages/flutter/AgentSpaces-windows.zip

  build-android:
    needs: build-web-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Flutter web assets
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-assets
          path: packages/flutter

      - uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.x'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get
        working-directory: packages/flutter

      - name: Decode keystore
        working-directory: packages/flutter/android/app
        run: echo -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release-key.jks

      - name: Build Android APK
        working-directory: packages/flutter
        run: flutter build apk --release --target-platform android-arm,android-arm64
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android AAB
        working-directory: packages/flutter
        run: flutter build appbundle --release --target-platform android-arm,android-arm64
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android
          path: |
            packages/flutter/build/app/outputs/flutter-apk/*.apk
            packages/flutter/build/app/outputs/bundle/release/*.aab

  release:
    needs: [build-macos, build-ios, build-windows, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/macos/*.zip
            artifacts/ios/*.ipa
            artifacts/windows/*.zip
            artifacts/android/**/*.apk
            artifacts/android/**/*.aab
